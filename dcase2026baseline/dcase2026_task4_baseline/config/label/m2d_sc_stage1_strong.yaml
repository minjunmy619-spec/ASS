---
task_name: m2d_sc_stage1_strong
description: Strong M2D single-label classifier with attentive statistics pooling.

deterministic: True
manual_seed: 0

datamodule:
    module: src.datamodules.datamodule
    main: DataModule
    args:
        train_dataloader:
            batch_size: 32
            num_workers: 8
            persistent_workers: false
            dataset:
                module: src.datamodules.source_classifier_dataset
                main: SourceClassifierDataset
                args:
                    base_dataset:
                        args:
                            config:
                                mode: generate
                                spatial_sound_scene:
                                    duration: 10.0
                                    sr: 32000
                                    max_event_overlap: 3
                                    max_event_dur: 10.0
                                    ref_db: -55
                                    foreground_dir: data/dev_set/sound_event/train
                                    background_dir: data/dev_set/noise/train
                                    interference_dir: data/dev_set/interference/train
                                    room_config:
                                        module: src.modules.spatial_audio_synthesizer.room
                                        main: SofaRoom
                                        args:
                                            path: data/dev_set/room_ir/train
                                            direct_range_ms: [6, 50]
                                dupse_rate: 0.5
                                dupse_min_angle: 60.0
                                max_n_dupse: 2
                                dupse_exclusion_folder_depth: 1
                                snr_range: [5, 20]
                                nevent_range: [0, 3]
                                ninterference_range: [0, 2]
                                inteference_snr_range: [0, 15]
                                dataset_length: 25088
                                shuffle_label: true
                                fg_return: {dry: true, dry_channel: 0, metadata: true}
                            n_sources: 3
                            label_set: dcase2026t4
                            return_source: true
                            label_vector_mode: stack
                            silence_label_mode: zeros
                            return_meta: false
lightning_module:
    module: src.training.lightningmodule.single_label_classification
    main: SingleLabelClassificationLightning
    args:
        model:
            module: src.models.m2dat.m2d_sc
            main: M2DSingleClassifierStrong
            args:
                weight_file: checkpoint/m2d_as_vit_base-80x1001p16x16p32k-240413_AS-FT_enconly/weights_ep69it3124-0.47998.pth
                num_classes: 18
                embedding_dim: 512
                pooling_hidden_dim: 512
                projection_hidden_dim: 1024
                dropout: 0.2
                finetuning_layers: 2_blocks
        loss:
            module: src.training.loss.m2d_sc_arcface
            main: get_loss_func
            args:
                lambda_energy: 0.0
        optimizer:
            module: torch.optim
            main: AdamW
            args:
                params: null
                lr: 0.0005
                betas: [0.9, 0.999]
                eps: 0.00000001
                weight_decay: 0.01
                amsgrad: true
        is_validation: false
train:
    callbacks: []
    trainer:
        module: lightning.pytorch
        main: Trainer
        args:
            accelerator: auto
            devices: auto
            strategy: ddp_find_unused_parameters_true
            num_nodes: 1
            precision: bf16-mixed
            logger: null
            fast_dev_run: False
            max_epochs: 100
            log_every_n_steps: 100
            use_distributed_sampler: True
            sync_batchnorm: True
            num_sanity_val_steps: 0
            enable_checkpointing: True
            enable_progress_bar: True
            enable_model_summary: True
            gradient_clip_val: 0.5
